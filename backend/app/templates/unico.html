{% extends "base.html" %}
{% block content %}

<div class="card shadow-sm">
  <div class="card-body">

    <h4 class="card-title mb-4">Novo Registo</h4>

    <form method="post" class="row g-3">

      <div class="col-md-12">
        <label class="form-label">Nome do Jornal</label>
        <input name="jornal_nome" class="form-control" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Fonte</label>
        <input name="fonte_nome" class="form-control" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Enquadramento</label>
        <input name="enquadramento_descricao" class="form-control" required>
      </div>

      <div class="col-12">
        <button class="btn btn-primary w-100">
          Guardar
        </button>
      </div>

    </form>

  </div>
</div>

{% endblock %}
