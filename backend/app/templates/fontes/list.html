{% extends "base.html" %}
{% block title %}Fontes{% endblock %}

{% block content %}
<h3>Fontes</h3>

<a href="/doutoramento/fontes/novo" class="btn btn-primary mb-3">Nova</a>

<table class="table table-striped">
    <tr>
        <th>ID</th>
        <th>Descrição</th>
        <th>Outro</th>
        <th></th>
    </tr>
    {% for f in fontes %}
    <tr>
        <td>{{ f.id }}</td>
        <td>{{ f.descricao }}</td>
        <td>{{ f.outro }}</td>
        <td>
            <a href="/doutoramento/fontes/{{ f.id }}/editar" class="btn btn-sm btn-warning">Editar</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
