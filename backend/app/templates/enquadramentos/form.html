{% extends "base.html" %}
{% block title %}Enquadramento{% endblock %}

{% block content %}
<h3>{{ 'Editar' if enquadramento else 'Novo' }} Enquadramento Responsabilidade</h3>

<form method="post" action="{% if enquadramento %}/doutoramento/enquadramentos/{{ enquadramento.id }}/editar{% else %}/doutoramento/enquadramentos/novo{% endif %}">
    <div class="mb-3">
        <label class="form-label">Descrição</label>
        <input type="text" name="descricao" class="form-control"
               value="{{ enquadramento.descricao if enquadramento else '' }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Outro</label>
        <input type="text" name="outro" class="form-control"
               value="{{ enquadramento.outro if enquadramento else '' }}">


    <button class="btn btn-success">Salvar</button>
    <a href="/doutoramento/enquadramentos" class="btn btn-secondary ms-2">
        Cancelar
    </a>
    </div>
</form>
{% endblock %}
