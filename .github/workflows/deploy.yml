name: Deploy produção (Docker + Azure VM)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login no Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build e push API
        run: |
          docker build -f Dockerfile.api \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/jornais-api:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/jornais-api:latest

      - name: Build e push Dashboard
        run: |
          docker build -f Dockerfile.streamlit \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/jornais-dashboard:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/jornais-dashboard:latest

      - name: Deploy na VM via Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/projetos/jornais
            docker compose -f docker-compose-prod.yml pull
            docker compose -f docker-compose-prod.yml up -d
            docker image prune -f